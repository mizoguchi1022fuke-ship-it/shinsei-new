<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F4E78">
<link rel="manifest" href="manifest.json">
<title>溝口急送 申請</title>
<style>
  :root{--navy:#1F4E78;--navy-d:#173a5a;--line:#dfe3ea;--bg:#eef1f5;--ink:#1b2733;--muted:#6b7785;--ok:#1f8a4c;--no:#c0392b;--shadow:0 1px 2px rgba(20,40,70,.06),0 6px 18px rgba(20,40,70,.06);--r:14px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%}
  header{background:var(--navy);color:#fff;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:10px}
  header h1{margin:0;font-size:16px;font-weight:700}
  header .who{font-size:12px;opacity:.85}
  header button{font:inherit;font-size:12px;background:rgba(255,255,255,.18);color:#fff;border:0;border-radius:8px;padding:6px 10px;cursor:pointer}
  main{max-width:560px;margin:0 auto;padding:16px;padding-bottom:90px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .lab{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
  .lab .req{color:var(--no);margin-left:3px}
  input[type=text],input[type=date],input[type=time],input[type=number],input[type=password],textarea{width:100%;font:inherit;font-size:16px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px;min-height:48px;appearance:none;-webkit-appearance:none}
  textarea{min-height:72px;resize:vertical}
  input:focus,textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(31,78,120,.15)}
  .row2{display:flex;gap:10px}.row2>*{flex:1;min-width:0}
  .btn{font:inherit;font-size:16px;font-weight:700;border-radius:12px;padding:14px 12px;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--ink);width:100%}
  .btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
  .btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}.btn.no{background:var(--no);border-color:var(--no);color:#fff}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tabs button{flex:1;font:inherit;font-size:14px;font-weight:700;padding:11px;border-radius:10px;border:1.5px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
  .tabs button[aria-selected=true]{background:var(--navy);color:#fff;border-color:var(--navy)}
  .dayrow{border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fbfcfe}
  .dayrow-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .dayrow-head .n{font-size:13px;font-weight:800;color:var(--navy)}
  .del{border:0;background:#f6e4e4;color:var(--no);font-weight:800;font-size:18px;width:32px;height:32px;border-radius:8px;cursor:pointer}
  .rowlab{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:3px}
  .rowcalc{font-size:12.5px;font-weight:700;color:var(--navy);margin-top:6px;min-height:1em}
  .addbtn{width:100%;border:1.5px dashed var(--navy);background:#fff;color:var(--navy);font-weight:700;font-size:15px;padding:13px;border-radius:10px;cursor:pointer;margin-top:2px}
  .addbtn:disabled{opacity:.4;border-style:solid;border-color:var(--line);color:var(--muted)}
  .total{font-size:14.5px;font-weight:800;color:var(--navy);margin-top:10px}
  .seg{display:flex;background:#eef1f5;border:1.5px solid var(--line);border-radius:10px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:transparent;font:inherit;font-size:14px;font-weight:700;color:var(--muted);padding:8px;border-radius:8px;cursor:pointer}
  .seg.yn button[data-v="承認"][aria-pressed=true]{background:var(--ok);color:#fff}
  .seg.yn button[data-v="却下"][aria-pressed=true]{background:var(--no);color:#fff}
  .pill{display:inline-block;font-size:12px;font-weight:700;border-radius:999px;padding:3px 10px}
  .pill.wait{background:#fff3da;color:#9a6b00}.pill.ok{background:#e3f3e9;color:var(--ok)}.pill.no{background:#fbe3e3;color:var(--no)}.pill.part{background:#e7eefb;color:var(--navy)}
  .muted{color:var(--muted);font-size:13px}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px 0}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:10px 16px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50}
  .toast.show{opacity:.96}
  .bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .bar .inner{max-width:560px;margin:0 auto}
  .hide{display:none!important}
</style>
</head>
<body>
<!-- ログイン -->
<div id="login-view">
  <header><h1>溝口急送 残業・休日出勤 申請</h1></header>
  <main>
    <div class="card">
      <p class="muted" style="margin-top:0">名前と社員番号でログインしてください。</p>
      <label class="lab">名前 <span class="req">*</span></label>
      <input type="text" id="in-name" placeholder="例）溝口太郎" autocomplete="off">
      <label class="lab" style="margin-top:12px">社員番号 <span class="req">*</span></label>
      <input type="text" id="in-empno" inputmode="numeric" placeholder="例）1001" autocomplete="off">
      <button class="btn primary" id="login-btn" style="margin-top:16px">ログイン</button>
      <p class="hint" id="login-msg" style="color:var(--no)"></p>
    </div>
  </main>
</div>

<!-- アプリ -->
<div id="app-view" class="hide">
  <header>
    <h1 id="app-title">申請</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="who" id="who"></span>
      <button id="logout-btn">ログアウト</button>
    </div>
  </header>
  <main>
    <div class="tabs" id="tabs"></div>
    <div id="content"></div>
  </main>
  <div class="bar hide" id="bar"><div class="inner"><button class="btn primary" id="bar-btn"></button></div></div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
